version: 1
locale: zh-TW
authoritative_for:
  - agent_workflow
  - phase_gates
  - override_flags
  - audit_artifact_paths

defaults:
  response_language: zh-TW
  test_command: python3 -m pytest -q
  artifact_root: data/projects/{project_id}/artifacts
  figures_dir: data/projects/{project_id}/figures

phase_controls:
  concept_alignment:
    tool: align_concept
    phase: phase_03_concept_alignment
    requires_user_confirmation: true
    confirmation_flag: confirm
    next_phase_unblocked_only_when_confirmed: true
  plan_ideation:
    tool: propose_analysis_plan
    phase: phase_04_creative_ideation
    requires_confirmed_phase_03: true
    requires_user_confirmation: true
    confirmation_flag: confirm
    draft_call: propose_analysis_plan(confirm=false)
    confirmation_call: propose_analysis_plan(confirm=true)
    confirmation_sequence: draft_then_user_review_then_confirm
    next_phase_unblocked_only_when_confirmed: true
    strategy: greedy_coverage_under_budget
    includes_internal_review_and_repair: true
    review_may_expand_soft_budget: true
    does_not_lock_plan: true
    output_artifacts:
      - greedy_analysis_candidates.json
      - greedy_analysis_candidates.md
      - greedy_analysis_review.json
      - greedy_analysis_review.md
      - greedy_execution_schedule.json
      - greedy_execution_schedule.md
      - greedy_plan_enrichment.json
      - greedy_plan_enrichment.md
      - greedy_statsmodels_base_analysis.py
  plan_completeness_review:
    tool: register_analysis_plan
    phase: phase_05_plan_completeness_review
    requires_user_confirmation: true
    confirmation_flag: confirm
    locks_plan_when_confirmed: false
    combined_with_plan_registration_when_confirmed: true
    same_tool_invocation_can_complete_phase_06: true
    methodology_review_applies_before_lock: true
    methodology_auto_expands_exploratory_branches_before_block: true
    methodology_override_flag: allow_methodology_override
    methodology_review_artifacts:
      - analysis_plan_review.json
      - analysis_plan_review.md
  plan_registration:
    tool: register_analysis_plan
    phase: phase_06_plan_registration
    requires_user_confirmation: true
    confirmation_flag: confirm
    locks_plan_when_confirmed: true
    performed_by_same_confirmed_register_analysis_plan_call: true
    execution_schedule_artifacts:
      - analysis_execution_schedule.json
      - analysis_execution_schedule.md
  execute_exploration:
    phase: phase_08_execute_exploration
    requires_locked_plan: true
    requires_successful_phase_07: true
    requires_decision_logging: true
  exploration_branch_loop:
    phase: phase_08_execute_exploration
    requires_locked_plan: true
    requires_successful_phase_07: true
    allows_autonomous_branch_running: true
    autonomous_scope: branch_scoped_exploratory_candidates_only
    does_not_modify_locked_plan_or_primary_conclusions: true
    tools:
      - open_exploration_branch
      - suggest_branch_experiments
      - start_autoresearch_run
      - get_autoresearch_status
      - stop_autoresearch_run
      - resume_autoresearch_run
      - run_autoresearch_next_task
      - run_autoresearch_queue
      - run_branch_experiment
      - evaluate_branch
      - promote_branch_to_plan_amendment
      - discard_branch
      - get_exploration_board
    artifact_names:
      - exploration_board.json
      - exploration_branches.jsonl
      - experiment_ledger.jsonl
      - branch_experiment_results.jsonl
      - branch_evaluations.jsonl
      - branch_promotion_gate.json
      - autoresearch_runs.jsonl
      - work_queue.jsonl
      - work_events.jsonl
      - budget_state.json
      - stop_decisions.jsonl
      - resume_decisions.jsonl
      - progress_events.jsonl
      - branch_results/{branch_id}.json
      - branch_results/{branch_id}/experiments/{experiment_id}.json
      - branch_results/{branch_id}_promotion_review.md
      - branch_results/{branch_id}_promotion_gate.json
      - plan_amendments/{branch_id}.json
      - plan_amendments/{branch_id}.md
      - plan_amendments.jsonl
    artifact_groups:
      always_possible:
        - exploration_board.json
        - exploration_branches.jsonl
        - experiment_ledger.jsonl
        - branch_experiment_results.jsonl
        - branch_evaluations.jsonl
        - branch_promotion_gate.json
      autoresearch_run_started:
        - autoresearch_runs.jsonl
        - work_queue.jsonl
        - work_events.jsonl
        - budget_state.json
        - progress_events.jsonl
      autoresearch_run_stopped:
        - stop_decisions.jsonl
      autoresearch_run_resumed:
        - resume_decisions.jsonl
      branch_promoted_after_audit_gate:
        - branch_results/{branch_id}_promotion_gate.json
        - plan_amendments/{branch_id}.json
        - plan_amendments/{branch_id}.md
        - plan_amendments.jsonl
    promotion_gate:
      tool: promote_branch_to_plan_amendment
      requires_audit_gate: true
      audit_tool: evaluate_branch
      requires_prior_audit_event: true
      blocks_stale_evaluation: true
      requires_confirmed_locked_plan: true
      requires_successful_phase_07: true
      requires_live_evidence_artifact: true
      requires_minimum_evidence_bundle:
        - sample_size
        - effect_or_model_metric
        - uncertainty_or_diagnostic_metric
      requires_user_confirmation: true
      confirmation_flag: confirm
      blocks_auto_merge_to_primary_conclusions: true
      output_artifacts:
        - branch_promotion_gate.json
        - branch_results/{branch_id}_promotion_gate.json
        - plan_amendments/{branch_id}.json
        - plan_amendments/{branch_id}.md
        - plan_amendments.jsonl
  ux_harness:
    phase: phase_00_project_setup
    purpose: no_code_user_guidance
    tools:
      - get_approval_card
      - get_harness_dashboard
      - build_artifact_index
      - get_blocker_playbook
    output_artifacts:
      - phase_00_project_setup/approval_card.json
      - phase_00_project_setup/approval_card.md
      - phase_00_project_setup/harness_dashboard.json
      - phase_00_project_setup/artifact_index.json
      - phase_00_project_setup/blocker_playbook.json
      - phase_00_project_setup/blocker_playbook.md
    must_not_execute_analysis: true
    must_not_override_phase_gates: true

override_controls:
  pii_detection:
    default_action: block_load
    tools:
      - load_dataset
      - run_intake
    explicit_override_flag: allow_pii
    user_visible_warning_required_on_override: true

audit_contract:
  decision_log_path: artifacts/phase_08_execute_exploration/decision_log.jsonl
  deviation_log_path: artifacts/phase_08_execute_exploration/deviation_log.jsonl
  phase_08_required_artifacts:
    - decision_log.jsonl
  phase_08_branch_loop_artifacts:
    - exploration_board.json
    - exploration_branches.jsonl
    - experiment_ledger.jsonl
    - branch_experiment_results.jsonl
    - branch_evaluations.jsonl
    - branch_promotion_gate.json
    - autoresearch_runs.jsonl
    - work_queue.jsonl
    - work_events.jsonl
    - budget_state.json
    - stop_decisions.jsonl
    - resume_decisions.jsonl
    - progress_events.jsonl
    - branch_results/{branch_id}.json
    - branch_results/{branch_id}/experiments/{experiment_id}.json
    - branch_results/{branch_id}_promotion_review.md
    - branch_results/{branch_id}_promotion_gate.json
    - plan_amendments/{branch_id}.json
    - plan_amendments/{branch_id}.md
    - plan_amendments.jsonl
  phase_12_required_artifacts:
    - final_report.md

tool_expectations:
  analysis_tools_require_min_sample_size: true
  create_visualization_uses_project_scoped_figures_dir: true
  export_report_uses_project_scoped_figures_dir: true
  export_handoff_includes_deviation_log: true

# ── Plan-Aware Enforcement (S-011) ──────────────────────────────────
plan_adherence:
  auto_detection: true
  mechanism: >-
    Phase 8 tools (_auto_log_decision) auto-compare the current operation
    against analysis_plan.yaml. If tool+variables don't match any planned
    analysis, a deviation entry is auto-logged to deviation_log.jsonl.
  deviation_log_auto_populated: true
  manual_override: log_deviation  # still available for manual recording

# ── Phase 4 Analysis Plan Schema ────────────────────────────────────
analysis_plan_schema:
  required_fields:
    - type   # must be a valid analysis type
  recommended_fields:
    - variables   # enables auto-deviation detection
    - rationale   # audit traceability
  valid_types:
    - compare_groups
    - analyze_variable
    - correlation_matrix
    - generate_table_one
    - run_advanced_analysis
    - run_repeated_measures
    - propensity_score
    - survival_analysis
    - roc_auc
    - logistic_regression
    - multiple_regression
    - power_analysis_advanced
    - descriptive
    - univariate
    - table_one
    - visualization

# ── Analysis Engine Delegation ──────────────────────────────────────
delegation:
  strategy: auto_fallback
  description: >-
    RDE routes analysis via AnalysisDelegator. Heavy analyses
    (propensity, survival, ROC, logistic, automl) are sent to
    automl-stat-mcp when available; otherwise fall back to local-lite
    statsmodels/scipy implementations where possible. Basic analyses
    (t-test, chi-square, correlation, table_one) always run locally.

  local_engine:
    name: ScipyStatisticalEngine + local-lite statsmodels/scipy
    capabilities:
      - t_test
      - mann_whitney
      - chi_square
      - fisher_exact
      - shapiro_wilk
      - anova
      - kruskal_wallis
      - friedman
      - correlation
      - table_one
      - descriptive
      - dunn_post_hoc
      - tukey_hsd
      - wilcoxon
      - point_biserial
      - logistic_regression
      - multiple_regression
      - glm
      - roc_auc
      - power_analysis_advanced
      - kaplan_meier
      - survival_analysis
      - cox_regression
      - propensity_score_lightweight

  automl_engine:
    name: automl-stat-mcp
    stats_service_url: http://localhost:8003
    automl_service_url: http://localhost:8001
    health_check: GET /health
    capabilities:
      - propensity_score
      - survival_analysis
      - kaplan_meier
      - cox_regression
      - roc_auc
      - logistic_regression
      - multiple_regression
      - glm
      - power_analysis_advanced
      - automl
    startup: cd vendor/automl-stat-mcp && docker compose up -d

  fallback_behavior: >-
    When automl is unavailable, run_advanced_analysis attempts local-lite
    implementations for adjusted models, ROC/AUC, basic power analysis,
    Kaplan-Meier summaries, Cox regression, and lightweight propensity
    scoring. Only unsupported heavy AutoML/vendor workflows return a
    descriptive error and suggest starting automl.

core_goal_contract:
  audience: non_data_scientists
  description: >-
    The harness must let agents help users who do not know which analyses
    to run, how to combine methods, or how to code analysis produce a
    complete, auditable report from real user datasets.
  readiness_gap_prefix: core_goal
  checked_by:
    - collect_results.report_readiness
    - assemble_report
    - export_report
    - run_audit
    - auto_improve
  required_capabilities:
    - data_understanding
    - analysis_planning
    - data_correctness
    - reproducible_exploration
    - analysis_execution_interpretation
    - analysis_completeness
    - report_generation
    - no_code_operation
    - agent_friendly_harness

# ── Pre-Commit Hooks ────────────────────────────────────────────────
pre_commit_hooks:
  - id: rde-decision-log-integrity
    constraint: H-010
    script: scripts/hooks/check_log_integrity.py
    checks: decision_log.jsonl and deviation_log.jsonl are append-only

  - id: rde-pii-scan
    constraint: H-004, H-006
    script: scripts/hooks/pii_scan.py
    checks: output files for email, phone, national ID, sensitive paths

  - id: rde-artifact-gate
    constraint: H-008
    script: scripts/hooks/artifact_gate.py
    checks: no skipped phases in committed project artifacts

  - id: rde-report-sanitize
    constraint: H-006
    script: scripts/hooks/report_sanitize.py
    checks: report files for leaked paths, credentials, tokens
