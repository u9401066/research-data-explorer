name: Publish Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publishMarketplace:
        description: Publish to Visual Studio Marketplace
        required: false
        default: true
        type: boolean
      publishOpenVsx:
        description: Publish to Open VSX
        required: false
        default: true
        type: boolean

jobs:
  cross-platform-smoke:
    name: VSIX cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: vscode-extension
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Check bundled asset contract
        run: npm run sync-assets:check

      - name: Compile extension
        run: npm run compile

      - name: Run cross-platform helper tests
        run: npm test -- test/utils.test.ts test/extensionHelpers.test.ts test/uvManager.test.ts

      - name: Check bundled Python install shape
        run: npm run test:install-smoke

      - name: Package VSIX
        run: npm run package -- --no-yarn

      - name: Validate packaged extension
        run: npm run validate -- --skip-tests

  package:
    needs: cross-platform-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    outputs:
      vsix_name: ${{ steps.package.outputs.vsix_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Lint extension
        run: npm run lint

      - name: Test extension
        run: npm test

      - name: Package VSIX
        id: package
        shell: bash
        run: |
          npm run package -- --no-yarn
          vsix_name=$(basename *.vsix)
          echo "vsix_name=${vsix_name}" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-vsix
          path: vscode-extension/*.vsix
          if-no-files-found: error

  publish-marketplace:
    needs: package
    if: github.event_name == 'push' || inputs.publishMarketplace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: packaged-vsix
          path: vscode-extension

      - name: Skip marketplace publish when token is unavailable
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not set; skipping Visual Studio Marketplace publish."

      - name: Publish to Visual Studio Marketplace
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath "${{ needs.package.outputs.vsix_name }}" --no-yarn

  publish-openvsx:
    needs: package
    if: github.event_name == 'push' || inputs.publishOpenVsx
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: packaged-vsix
          path: vscode-extension

      - name: Skip Open VSX publish when token is unavailable
        if: env.OVSX_PAT == ''
        run: echo "OVSX_PAT is not set; skipping Open VSX publish."

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx ovsx publish "${{ needs.package.outputs.vsix_name }}" -p "$OVSX_PAT"
