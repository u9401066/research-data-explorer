  <g filter="url(#shL)">
    <rect x="40" y="572" width="660" height="136" rx="14" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.5"/>
    <rect x="40" y="572" width="660" height="34" rx="14" fill="#dc2626"/>
    <rect x="40" y="592" width="660" height="14" fill="#dc2626"/>
    <text x="60" y="594" font-size="14" font-weight="700" fill="#fff">Infrastructure Layer — 外部適配器</text>
    <text x="490" y="594" font-size="10" fill="#fecdd3">src/rde/infrastructure/</text>

    <g>
      <rect x="60" y="620" width="150" height="42" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
      <text x="135" y="636" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">Pandas Adapter</text>
      <text x="135" y="652" text-anchor="middle" font-size="8.5" fill="#64748b">CSV / Excel / Parquet</text>
    </g>
    <g>
      <rect x="222" y="620" width="150" height="42" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
      <text x="297" y="636" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">SciPy Engine</text>
      <text x="297" y="652" text-anchor="middle" font-size="8.5" fill="#64748b">16 Statistical Capabilities</text>
    </g>
    <g>
      <rect x="384" y="620" width="150" height="42" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
      <text x="459" y="636" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">Analysis Delegator</text>
      <text x="459" y="652" text-anchor="middle" font-size="8.5" fill="#64748b">Local vs Vendor Routing</text>
    </g>
    <g>
      <rect x="546" y="620" width="142" height="42" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
      <text x="617" y="636" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">AutoML Gateway</text>
      <text x="617" y="652" text-anchor="middle" font-size="8.5" fill="#64748b">Anti-Corruption Layer</text>
    </g>

    <rect x="60" y="672" width="628" height="26" rx="6" fill="#ffe4e6"/>
    <text x="374" y="690" text-anchor="middle" font-size="10" fill="#9f1239">File I/O · Profiler (ydata) · DOCX Export · PII Detector · Artifact Persistence</text>
  </g>

  <!-- Dependency arrow: Infrastructure → Domain (goes UP, reversed) -->
  <line x1="300" y1="572" x2="300" y2="552" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="308" y="565" font-size="9" fill="#3b82f6">implements ports</text>

  <!-- ======== External Systems (right column) ======== -->
  <!-- VS Code Extension -->
  <g filter="url(#sh)">
    <rect x="730" y="92" width="240" height="90" rx="12" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
    <text x="850" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">VS Code Extension</text>
    <text x="850" y="135" text-anchor="middle" font-size="10" fill="#64748b">Agent Mode + Custom Agents</text>
    <text x="850" y="152" text-anchor="middle" font-size="9" fill="#94a3b8">ask · architect · eda · audit</text>
    <text x="850" y="168" text-anchor="middle" font-size="9" fill="#94a3b8">orchestrator · deep-thinker</text>
  </g>

  <!-- Arrow: VS Code → Interface -->
  <line x1="730" y1="150" x2="700" y2="150" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
  <text x="715" y="143" text-anchor="middle" font-size="8" fill="#ef4444">stdio</text>

  <!-- automl-stat-mcp -->
  <g filter="url(#sh)">
    <rect x="730" y="340" width="240" height="100" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="850" y="364" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">automl-stat-mcp</text>
    <text x="850" y="384" text-anchor="middle" font-size="10" fill="#64748b">Vendor Heavy Analysis Engine</text>
    <text x="850" y="402" text-anchor="middle" font-size="9" fill="#94a3b8">Propensity Score · Survival · ROC</text>
    <text x="850" y="418" text-anchor="middle" font-size="9" fill="#94a3b8">Power · AutoML · 10 Capabilities</text>
    <text x="850" y="432" text-anchor="middle" font-size="8" fill="#d97706">Docker: localhost:8002/sse</text>
  </g>

  <!-- Arrow: Infrastructure → automl-stat-mcp -->
  <line x1="688" y1="640" x2="730" y2="400" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
  <text x="728" y="530" font-size="8" fill="#ef4444" transform="rotate(-60,728,530)">HTTP / SSE</text>

  <!-- Data Projects -->
  <g filter="url(#sh)">
    <rect x="730" y="480" width="240" height="80" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="850" y="504" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">data/projects/</text>
    <text x="850" y="524" text-anchor="middle" font-size="10" fill="#64748b">YYYYMMDD_HHMMSS_&lt;id&gt;/</text>
    <text x="850" y="542" text-anchor="middle" font-size="9" fill="#94a3b8">artifacts/ · logs/ · reports/ · plans/</text>
  </g>

  <!-- Arrow: Infrastructure → Data -->
  <line x1="700" y1="660" x2="730" y2="530" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrR)"/>

  <!-- Governance Docs -->
  <g filter="url(#sh)">
    <rect x="730" y="590" width="240" height="80" rx="12" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="850" y="614" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Governance Documents</text>
    <text x="850" y="634" text-anchor="middle" font-size="9" fill="#64748b">SPEC.md · CONSTITUTION.md</text>
    <text x="850" y="650" text-anchor="middle" font-size="9" fill="#64748b">AGENTS.md · agent-control.yaml</text>
    <text x="850" y="662" text-anchor="middle" font-size="8" fill="#94a3b8">Policy layer constraining agent behavior</text>
  </g>

  <!-- Bottom bar -->
  <rect x="40" y="730" width="920" height="70" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <text x="500" y="758" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">依賴方向：Interface → Application → Domain ← Infrastructure</text>
  <text x="500" y="782" text-anchor="middle" font-size="11" fill="#94a3b8">Domain 層為核心，不依賴任何外部框架 · Infrastructure 實作 Domain 定義的 Port (抽象介面)</text>
</svg>