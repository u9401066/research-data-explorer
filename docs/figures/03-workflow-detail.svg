    <rect width="1040" height="56" rx="10" fill="#1e293b"/>
    <text x="30" y="28" font-size="13" font-weight="700" fill="#fbbf24">🔒 硬性約束摘要</text>
    <text x="250" y="22" font-size="9.5" fill="#e2e8f0">H-001 檔案 &lt;500MB</text>
    <text x="250" y="38" font-size="9.5" fill="#e2e8f0">H-002 格式白名單</text>
    <text x="250" y="54" font-size="9.5" fill="#e2e8f0">H-003 最小樣本</text>
    <text x="420" y="22" font-size="9.5" fill="#e2e8f0">H-004 PII 偵測</text>
    <text x="420" y="38" font-size="9.5" fill="#e2e8f0">H-005 報告完整性</text>
    <text x="420" y="54" font-size="9.5" fill="#e2e8f0">H-006 輸出清洗</text>
    <text x="580" y="22" font-size="9.5" fill="#e2e8f0">H-007 計畫鎖定</text>
    <text x="580" y="38" font-size="9.5" fill="#e2e8f0">H-008 Artifact 閘門</text>
    <text x="740" y="22" font-size="9.5" fill="#e2e8f0">H-009 決策日誌</text>
    <text x="740" y="38" font-size="9.5" fill="#e2e8f0">H-010 Append-only</text>
    <text x="900" y="30" font-size="10" fill="#94a3b8" font-style="italic">Enforced by code,</text>
    <text x="900" y="46" font-size="10" fill="#94a3b8" font-style="italic">not just prompts.</text>
  </g>

  <!-- Soft constraints note -->
  <g transform="translate(30, 820)">
    <rect width="1040" height="46" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="30" y="22" font-size="11" font-weight="600" fill="#475569">📋 軟性約束提醒：</text>
    <text x="170" y="22" font-size="10" fill="#64748b">常態性檢定 · 非參數備案 · 多重比較校正 · 缺失值模式審查 · 共線性警示 · 效應量解讀 · 檢定力提示</text>
    <text x="30" y="40" font-size="10" fill="#94a3b8">Agent 不盲目執行所有方法 — 由 Pipeline 依資料型別、研究問題自動選擇適合的統計方法，拒絕「想到就跑」的研究方式</text>
  </g>

  <!-- Phase 8 delegation detail -->
