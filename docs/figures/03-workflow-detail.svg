    <text x="16" y="44" font-size="11" fill="#334155">propose_analysis_plan()</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 候選分析方向生成</text>
    <text x="16" y="76" font-size="9" fill="#64748b">• 方法學內部審查 + 修復</text>
    <text x="16" y="90" font-size="9" fill="#64748b">• 視覺化 Bundle + 執行排程</text>
    <text x="16" y="106" font-size="9" fill="#64748b">📦 proposed_plan.yaml · viz_bundle · exec_schedule</text>
  </g>

  <!-- Arrow right -->
  <line x1="714" y1="328" x2="744" y2="328" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============ PHASE 5/6 ============ -->
  <g filter="url(#s)" transform="translate(750, 268)">
    <rect width="310" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#15803d">Phase 5/6: 審查與計畫鎖定 ✋🔒</text>
    <text x="16" y="44" font-size="11" fill="#334155">register_analysis_plan(confirm=true)</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 方法學閘門：計畫太薄 → 自動擴充</text>
    <text x="16" y="76" font-size="9" fill="#64748b">• alpha / 多重比較 / 缺失值策略鎖定</text>
    <text x="16" y="90" font-size="9" fill="#64748b">• 執行排程 artifact 持久化</text>
    <text x="16" y="106" font-size="9" fill="#64748b">📦 analysis_plan.yaml (locked) · execution_schedule</text>
  </g>

  <!-- Arrow down from Phase 5/6 -->
  <line x1="905" y1="392" x2="905" y2="424" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

