  <rect width="1100" height="920" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">Research Data Explorer — 13-Phase 工作流程細部介紹</text>
  <text x="550" y="62" text-anchor="middle" font-size="12" fill="#64748b">Constrained Auditable EDA Pipeline · Each phase enforced by code, not just prompts</text>

  <!-- Legend -->
  <g transform="translate(30, 76)">
    <rect width="1040" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="30" cy="15" r="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="44" y="19" font-size="10" fill="#475569">初始化 Setup</text>
    <circle cx="150" cy="15" r="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="164" y="19" font-size="10" fill="#475569">治理 Governance</text>
    <circle cx="290" cy="15" r="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="304" y="19" font-size="10" fill="#475569">分析執行 Execution</text>
    <circle cx="450" cy="15" r="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
    <text x="464" y="19" font-size="10" fill="#475569">報告交付 Reporting</text>

    <text x="620" y="19" font-size="10" fill="#475569">🔒 = 閘門 Gate</text>
    <text x="720" y="19" font-size="10" fill="#475569">✋ = 需使用者確認</text>
    <text x="850" y="19" font-size="10" fill="#475569">📦 = 產出 Artifact</text>
    <text x="975" y="19" font-size="10" fill="#dc2626" font-weight="600">▼ 硬性約束</text>
  </g>

  <!-- ============ PHASE 0 ============ -->
  <g filter="url(#s)" transform="translate(30, 120)">
    <rect width="230" height="108" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#1d4ed8">Phase 0: 專案初始化</text>
    <text x="16" y="44" font-size="11" fill="#334155">init_project</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 建立 data/projects/YYYYMMDD_ID/</text>
    <text x="16" y="76" font-size="9" fill="#64748b">• 初始化 pipeline state</text>
    <text x="16" y="90" font-size="9" fill="#64748b">📦 project_metadata.json</text>
    <text x="16" y="102" font-size="8" fill="#dc2626">▼ RDE_WORKSPACE 環境解析</text>
  </g>

  <!-- Arrow -->
  <line x1="265" y1="174" x2="290" y2="174" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============ PHASE 1 ============ -->
  <g filter="url(#s)" transform="translate(295, 120)">
    <rect width="230" height="108" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#1d4ed8">Phase 1: 資料收錄</text>
    <text x="16" y="44" font-size="11" fill="#334155">run_intake</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 檔案大小 / 格式驗證</text>
    <text x="16" y="76" font-size="9" fill="#64748b">• PII 偵測（預設阻擋）</text>
    <text x="16" y="90" font-size="9" fill="#64748b">📦 intake_report.json</text>
    <text x="16" y="102" font-size="8" fill="#dc2626">▼ H-001: &lt;500MB · H-002: 白名單 · H-004: PII</text>
  </g>

  <!-- Arrow -->
  <line x1="530" y1="174" x2="555" y2="174" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============ PHASE 2 ============ -->
  <g filter="url(#s)" transform="translate(560, 120)">
    <rect width="230" height="108" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#1d4ed8">Phase 2: Schema + Profiling</text>
    <text x="16" y="44" font-size="11" fill="#334155">build_schema · profile_dataset</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 欄位型別推斷與註冊</text>
    <text x="16" y="76" font-size="9" fill="#64748b">• 資料品質 Profiling (ydata)</text>
    <text x="16" y="90" font-size="9" fill="#64748b">📦 schema.json · profile_report.html</text>
    <text x="16" y="102" font-size="8" fill="#dc2626">▼ H-003: 最小樣本數檢查</text>
  </g>

  <!-- Arrow down -->
  <line x1="675" y1="232" x2="675" y2="264" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============ PHASE 3 ============ -->
  <g filter="url(#s)" transform="translate(30, 268)">
    <rect width="330" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#15803d">Phase 3: 概念對齊 ✋🔒</text>
    <text x="16" y="44" font-size="11" fill="#334155">align_concept(confirm=true)</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 鎖定分析單位（病人/手術/檢體）</text>
    <text x="16" y="76" font-size="9" fill="#64748b">• 鎖定暴露變項與主/次要結局</text>
    <text x="16" y="90" font-size="9" fill="#64748b">• 結局類型：連續/二元/類別/存活/重複量測</text>
    <text x="16" y="106" font-size="9" fill="#64748b">📦 concept_alignment.json · 需使用者 confirm=true</text>
  </g>

  <!-- Arrow right -->
  <line x1="364" y1="328" x2="394" y2="328" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============ PHASE 4 ============ -->
  <g filter="url(#s)" transform="translate(400, 268)">
    <rect width="310" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
