    <text x="16" y="62" font-size="9" fill="#64748b">• verify_audit_trail</text>
    <text x="16" y="76" font-size="9" fill="#64748b">📦 handoff_package/ · audit_trail ✓</text>
    <text x="16" y="86" font-size="8" fill="#dc2626">▼ H-006: 輸出清洗 (sanitization)</text>
