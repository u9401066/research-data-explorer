    <text x="16" y="44" font-size="11" fill="#334155">run_audit</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 計畫遵守度 / Artifact 完整性</text>
    <text x="16" y="76" font-size="9" fill="#64748b">📦 audit_report.json</text>
