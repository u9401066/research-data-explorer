      <text x="411" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">correlation_matrix</text>
      <text x="411" y="68" text-anchor="middle" font-size="8" fill="#78716c">Correlation + VIF 共線性</text>
    </g>
    <g>
      <rect x="496" y="40" width="180" height="34" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
      <text x="586" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">generate_table_one</text>
      <text x="586" y="68" text-anchor="middle" font-size="8" fill="#78716c">基線特徵描述表</text>
    </g>

    <g>
      <rect x="16" y="82" width="210" height="34" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="121" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">run_advanced_analysis</text>
      <text x="121" y="110" text-anchor="middle" font-size="8" fill="#78716c">Logistic / Cox / ROC / CUSUM / AutoML</text>
    </g>
    <g>
      <rect x="236" y="82" width="210" height="34" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
      <text x="341" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">run_repeated_measures</text>
      <text x="341" y="110" text-anchor="middle" font-size="8" fill="#78716c">重複量測 / Before-After</text>
    </g>
    <g>
      <rect x="456" y="82" width="220" height="34" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
      <text x="566" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">create_visualization</text>
      <text x="566" y="110" text-anchor="middle" font-size="8" fill="#78716c">histogram/boxplot/scatter/heatmap/line/bar</text>
    </g>

    <rect x="16" y="124" width="660" height="18" rx="4" fill="#fef9c3"/>
    <text x="346" y="137" text-anchor="middle" font-size="9" fill="#92400e">📦 Artifacts: analysis_results/ · figures/ · decision_log.jsonl · deviation_log.jsonl</text>
    <text x="16" y="160" font-size="8" fill="#dc2626">▼ H-009: 每次分析必須記錄決策 · H-010: append-only 日誌 · 方法由資料自動選擇，不盲目執行所有方法</text>
  </g>

  <!-- Arrow down from Phase 8 -->
  <line x1="370" y1="602" x2="370" y2="634" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============ PHASE 9 ============ -->
  <g filter="url(#s)" transform="translate(30, 638)">
    <rect width="230" height="90" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#7e22ce">Phase 9: 結果彙整</text>
    <text x="16" y="44" font-size="11" fill="#334155">collect_results</text>
    <text x="16" y="62" font-size="9" fill="#64748b">• 掃描所有 Phase 8 artifacts</text>
    <text x="16" y="76" font-size="9" fill="#64748b">📦 collected_results.json</text>
