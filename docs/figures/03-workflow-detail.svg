    <text x="16" y="54" font-size="9" fill="#64748b">遠端 automl-stat-mcp: 10 capabilities</text>
    <text x="16" y="68" font-size="9" fill="#64748b">Delegator 自動判斷 → fallback artifact</text>
  </g>
