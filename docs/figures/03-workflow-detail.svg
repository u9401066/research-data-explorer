    <text x="16" y="76" font-size="9" fill="#64748b">• 計畫已鎖定 · Schema 已註冊</text>
    <text x="16" y="86" font-size="8" fill="#dc2626">▼ H-007: 必須通過才能進入 Phase 8 · H-008: artifact gate</text>
