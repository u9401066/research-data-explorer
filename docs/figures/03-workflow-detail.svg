      <text x="91" y="68" text-anchor="middle" font-size="8" fill="#78716c">t / MWU / ANOVA / KW / chi2</text>
    </g>
    <g>
      <rect x="176" y="40" width="150" height="34" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
