    <text x="16" y="76" font-size="9" fill="#64748b">📦 report.docx · report_integrity_check</text>
    <text x="16" y="86" font-size="8" fill="#dc2626">▼ H-005: 報告完整性校驗</text>
  </g>

  <!-- Arrow -->
  <line x1="534" y1="683" x2="564" y2="683" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

